name: Daily Scraping Report Rebuild

# Daily 11:30 UTC — runs after all the other daily scrapers finish
# (7:17 enforcement, 8:23 oversight, 8:42 media, 9:13 hearings).
# Regenerates SCRAPING_REPORT.md and SCRAPING_REPORT.docx from live code
# and data. If the report changed, auto-commits.

on:
  schedule:
    - cron: '31 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-docx

      - name: Rebuild report
        run: python build_scraping_report.py

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet SCRAPING_REPORT.md SCRAPING_REPORT.docx; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated report
        if: steps.changes.outputs.has_changes == 'true'
        env:
          RUN_ID: ${{ github.run_id }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          DATE=$(date +%Y-%m-%d)
          MSG_FILE=$(mktemp)
          {
            echo "Auto-update: SCRAPING_REPORT regenerated (${DATE})"
            echo
            echo "Daily rebuild from live code + data."
            echo "Generated by .github/workflows/scraping-report.yml run ${RUN_ID}"
          } > "$MSG_FILE"
          git add SCRAPING_REPORT.md SCRAPING_REPORT.docx
          git commit -F "$MSG_FILE"
          git push origin main

      - name: No-op notice
        if: steps.changes.outputs.has_changes == 'false'
        run: echo "::notice::Scraping report unchanged; nothing to commit."
